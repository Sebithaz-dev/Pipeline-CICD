<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entorno IA - Seba</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"></head>
<body>
    <div class="container">
        <div class="card">
            <h1>Entorno Operativo</h1>
            <p class="status">Estado: <span>Online</span></p>
            <hr>
            <p><strong>Mensaje:</strong> {{ mensaje }}</p>
            <p><strong>Asignatura:</strong> {{ curso }}</p>
            <div class="badge">Render + Docker + Gunicorn</div>
        </div>
    </div>
</body>
</html>
